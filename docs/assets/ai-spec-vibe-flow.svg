    <marker id="a2" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="a3" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="a4" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#10b981"/></marker>
    <marker id="a5" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#f87171"/></marker>
    <marker id="a6" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#8b5cf6"/></marker>
  </defs>

  <rect width="1100" height="720" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="bold">Vibe Coding 融入现有开发流程</text>
