  <text x="550" y="103" text-anchor="middle" fill="#d97706" font-size="9">OpenSpec / Speckit 管理 · 接口签名 · 领域约束 · 错误码 · 用例场景 · 版本化 Git 管理 · Lint · Breaking Change 检测</text>

  <!-- Vertical golden lines dropping from Spec bar to each stage -->
