  <text x="550" y="140" text-anchor="middle" fill="#fbbf24" font-size="7">驱动开发</text>
  <text x="830" y="135" text-anchor="middle" fill="#fbbf24" font-size="7">驱动校验</text>
  <text x="1000" y="135" text-anchor="middle" fill="#fbbf24" font-size="7">验证一致性</text>

