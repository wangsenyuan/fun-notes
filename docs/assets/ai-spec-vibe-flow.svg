  <line x1="550" y1="113" x2="550" y2="145" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="830" y1="113" x2="830" y2="140" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#a3)"/>
  <line x1="1000" y1="113" x2="1000" y2="140" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#a3)"/>

